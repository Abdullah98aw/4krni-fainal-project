<app-layout title="إدارة المستخدمين">
  <ng-container slot="actions">
    <button class="btn-primary" (click)="openCreate()">
      <span class="material-icons">person_add</span>
      إضافة مستخدم
    </button>
  </ng-container>

  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>جاري التحميل...</p>
  </div>

  <div *ngIf="!loading" class="users-grid">
    <div *ngFor="let user of users" class="user-card">
      <div class="user-card-header">
        <div class="user-avatar">{{ user.name.charAt(0) }}</div>
        <div class="user-info">
          <h3 class="user-name">{{ user.name }}</h3>
          <p class="user-email">{{ user.email }}</p>
        </div>
        <span class="role-badge" [class]="user.role.toLowerCase()">
          {{ user.role === 'ADMIN' ? 'مدير' : 'موظف' }}
        </span>
      </div>
      <div class="user-card-body">
        <div class="user-detail">
          <span class="material-icons">badge</span>
          {{ user.nationalId }}
        </div>
      </div>
      <div class="user-card-actions">
        <button class="btn-icon edit" (click)="openEdit(user)">
          <span class="material-icons">edit</span>
        </button>
        <button class="btn-icon delete" (click)="deleteUser(user.id)">
          <span class="material-icons">delete</span>
        </button>
      </div>
    </div>
  </div>
</app-layout>

<!-- Modal -->
<div *ngIf="showModal" class="modal-overlay" (click)="showModal = false">
  <div class="modal" (click)="$event.stopPropagation()" dir="rtl">
    <div class="modal-header">
      <h2>{{ isEditing ? 'تعديل مستخدم' : 'إضافة مستخدم جديد' }}</h2>
      <button (click)="showModal = false">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" [(ngModel)]="editingUser.name" class="form-input" placeholder="أدخل الاسم" />
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" [(ngModel)]="editingUser.email" class="form-input" placeholder="أدخل البريد الإلكتروني" dir="ltr" />
      </div>
      <div class="form-group">
        <label>رقم الهوية</label>
        <input type="text" [(ngModel)]="editingUser.nationalId" class="form-input" placeholder="أدخل رقم الهوية" dir="ltr" />
      </div>
      <div class="form-group">
        <label>الدور</label>
        <select [(ngModel)]="editingUser.role" class="form-input">
          <option value="USER">موظف</option>
          <option value="ADMIN">مدير</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" (click)="showModal = false">إلغاء</button>
      <button class="btn-primary" (click)="save()" [disabled]="saving">
        {{ saving ? 'جاري الحفظ...' : 'حفظ' }}
      </button>
    </div>
  </div>
</div>
