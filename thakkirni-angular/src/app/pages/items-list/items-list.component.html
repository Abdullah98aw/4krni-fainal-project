<app-layout [title]="pageTitle">
  <ng-container slot="actions">
    <button *ngIf="isAdmin" class="btn-primary" (click)="showCreateModal = true">
      <span class="material-icons">add</span>
      إضافة جديد
    </button>
  </ng-container>

  <div class="list-content">
    <!-- Filters -->
    <div class="filters-bar">
      <div class="search-wrapper">
        <span class="material-icons search-icon">search</span>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (ngModelChange)="applyFilters()"
          placeholder="بحث..."
          class="search-input"
        />
      </div>
      <select [(ngModel)]="filterType" (ngModelChange)="applyFilters()" class="filter-select">
        <option value="">الكل</option>
        <option value="TASK">مهام</option>
        <option value="COMMITTEE">منظمات</option>
      </select>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="loading-state">
      <div class="spinner"></div>
      <p>جاري التحميل...</p>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && filteredItems.length === 0" class="empty-state">
      <span class="material-icons empty-icon">inbox</span>
      <p>لا توجد عناصر</p>
    </div>

    <!-- Items Grid -->
    <div *ngIf="!loading && filteredItems.length > 0" class="items-grid">
      <a *ngFor="let item of filteredItems" [routerLink]="['/items', item.id]" class="item-card">
        <div class="item-card-header">
          <div class="item-badges">
            <span class="badge type" [class]="item.type.toLowerCase()">
              {{ item.type === 'TASK' ? 'مهمة' : 'منظمة' }}
            </span>
            <span *ngIf="item.importance === 'SECRET'" class="badge secret">سري</span>
          </div>
          <span class="item-number">#{{ item.itemNumber }}</span>
        </div>
        <h3 class="item-title">{{ item.title }}</h3>
        <p class="item-desc">{{ item.description }}</p>
        <div class="item-footer">
          <div class="item-date">
            <span class="material-icons">event</span>
            {{ item.dueDate | date:'dd/MM/yyyy' }}
          </div>
          <div *ngIf="item.unreadCount && item.unreadCount > 0" class="unread-badge">
            {{ item.unreadCount }} رسالة
          </div>
        </div>
      </a>
    </div>
  </div>
</app-layout>

<!-- Create Modal -->
<div *ngIf="showCreateModal" class="modal-overlay" (click)="showCreateModal = false">
  <div class="modal" (click)="$event.stopPropagation()" dir="rtl">
    <div class="modal-header">
      <h2>إضافة مهمة / منظمة جديدة</h2>
      <button (click)="showCreateModal = false">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>النوع</label>
          <select [(ngModel)]="newItem.type" class="form-input">
            <option value="TASK">مهمة</option>
            <option value="COMMITTEE">منظمة</option>
          </select>
        </div>
        <div class="form-group">
          <label>الأهمية</label>
          <select [(ngModel)]="newItem.importance" class="form-input">
            <option value="NORMAL">عادي</option>
            <option value="SECRET">سري</option>
          </select>
        </div>
      </div>

      <div *ngIf="newItem.type === 'COMMITTEE'" class="form-group">
        <label>نوع المنظمة</label>
        <select [(ngModel)]="newItem.committeeType" class="form-input">
          <option value="INTERNAL">داخلية</option>
          <option value="EXTERNAL">خارجية</option>
        </select>
      </div>

      <div class="form-group">
        <label>العنوان *</label>
        <input type="text" [(ngModel)]="newItem.title" class="form-input" placeholder="أدخل العنوان" />
      </div>

      <div class="form-group">
        <label>الوصف</label>
        <textarea [(ngModel)]="newItem.description" class="form-input" rows="3" placeholder="أدخل الوصف"></textarea>
      </div>

      <div class="form-group">
        <label>تاريخ الاستحقاق *</label>
        <input type="date" [(ngModel)]="newItem.dueDate" class="form-input" />
      </div>

      <div class="form-group">
        <label>الأعضاء</label>
        <div class="users-checkboxes">
          <label *ngFor="let user of users" class="user-checkbox">
            <input
              type="checkbox"
              [checked]="newItem.memberIds.includes(user.id)"
              (change)="toggleMember(user.id)"
            />
            {{ user.name }}
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>المكلفون</label>
        <div class="users-checkboxes">
          <label *ngFor="let user of users" class="user-checkbox">
            <input
              type="checkbox"
              [checked]="newItem.assigneeIds.includes(user.id)"
              (change)="toggleAssignee(user.id)"
            />
            {{ user.name }}
          </label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" (click)="showCreateModal = false">إلغاء</button>
      <button class="btn-primary" (click)="createItem()" [disabled]="creating">
        <span *ngIf="!creating">إضافة</span>
        <span *ngIf="creating">جاري الإضافة...</span>
      </button>
    </div>
  </div>
</div>
